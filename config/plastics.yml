model: 'plastics'

transience: 
  transience_run: True
  baseline_pickle_path: 'model_plastics_SSP2_transience_baseline_default_2c0a4149_2026-05-11--18-27-20.pickle'
  transience_scenario: 'baseline'
  trade_scenario: 'default'

input:
  force_extract_tgz: False
  input_data_path: '../remind_mfa_data'
  input_data_revision: '1.2.0leonie_regionalfix'
  region_mapping: '2c0a4149' # EU27+3 TRANSIENCE region mapping
  scenarios_path: 'config/scenarios'

model_switches:
  scenario: 'SSP2'
  stock_extrapolation_class_name: 'LogisticExtrapolation'
  regress_over: 'loggdppc'
  do_stock_extrapolation_with_time_factor: True
  lifetime_model_name: 'LogNormalLifetime'
  do_stock_extrapolation_by_category: True
  parameter_extrapolation:
    waste_his_imports: LinearToTargetExtrapolation
    waste_his_exports: LinearToTargetExtrapolation
    collection_rate: LinearToTargetExtrapolation
    incineration_rate: LinearToTargetExtrapolation
    mechanical_recycling_rate: LinearToTargetExtrapolation
    chemical_recycling_rate: LinearToTargetExtrapolation
    bio_production_rate: LinearToTargetExtrapolation
    daccu_production_rate: LinearToTargetExtrapolation
    emission_capture_rate: ConstantExtrapolation
    material_shares_use_inflow: ConstantExtrapolation

visualization:
  do_visualize: True
  do_show_figs: True
  do_save_figs: False
  figures_path: 'data/plastics/output/transience/figures'
  use_stock:
    do_visualize: True
    over_gdp: True
    accumulate_gdp: False
    per_capita: True
  consumption:
    do_visualize: True
    per_capita: True
  production:
    do_visualize: False
  trade:
    do_visualize: True
  extrapolation:
    do_visualize: True
  sankey:
    do_visualize: False
    plotter_args:
      slice_dict:
        t: 2019
        #r: 'EUR'
        #m: 'Fibres'
      exclude_processes:
        - "sysenv"
        #- "waste_market"
        #- "primary_market"
        #- "intermediate_market"
        #- "good_market"
      exclude_flows: [ ]
  flows:
    do_visualize: False

export:
  do_export: True
  path: 'data/plastics/output/transience'
  pickle:
    do_export: True
  csv:
    do_export: False
  iamc:
    do_export: False
  assumptions:
    do_export: False
  docs:
    do_export: False
    path: 'docs/plastics'
