model: 'plastics'

input:
  force_extract_tgz: False
  input_data_path: '../remind_mfa_data'
  input_data_revision: '1.4.0'
  region_mapping: 'h12'
  scenarios_path: 'config/scenarios'

model_switches:
  scenario: 'SSP2'
  stock_extrapolation_class_name: 'LogisticExtrapolation'
  regress_over: 'loggdppc'
  do_stock_extrapolation_with_time_factor: True
  lifetime_model_name: 'LogNormalLifetime'
  do_stock_extrapolation_by_category: True
  parameter_extrapolation:
    waste_his_imports: LinearToTargetExtrapolation
    waste_his_exports: LinearToTargetExtrapolation
    collection_rate: LinearToTargetExtrapolation
    landfill_rate: LinearToTargetExtrapolation
    mechanical_recycling_rate: LinearToTargetExtrapolation
    chemical_recycling_rate: LinearToTargetExtrapolation
    bio_production_rate: LinearToTargetExtrapolation
    daccu_production_rate: LinearToTargetExtrapolation
    emission_capture_rate: ConstantExtrapolation
    material_shares_use_inflow: ConstantExtrapolation

visualization:
  do_visualize: True
  do_show_figs: True
  do_save_figs: False
  figures_path: 'data/plastics/output/figures'
  use_stock:
    do_visualize: True
    over_gdp: True
    accumulate_gdp: False
    per_capita: True
  consumption:
    do_visualize: True
    per_capita: True
  production:
    do_visualize: False
  trade:
    do_visualize: True
  extrapolation:
    do_visualize: True
  sankey:
    do_visualize: True
    plotter_args:
      slice_dict:
        t: 2050
        #r: 'EUR'
        #m: 'Fibres'
        e: 'C'
      exclude_processes:
        - "sysenv"
        #- "waste_market"
        #- "primary_market"
        #- "intermediate_market"
        #- "good_market"
      exclude_flows: [ ]
  flows:
    do_visualize: True

export:
  do_export: False
  path: 'data/plastics/output/export'
  pickle:
    do_export: True
  csv:
    do_export: True
  iamc:
    do_export: True
  assumptions:
    do_export: True
  docs:
    do_export: True
    path: 'docs/plastics'
