model: 'plastics'

input:
  madrat_output_path: '../../madrat/output_cluster'
  force_extract_tgz: False
  input_data_path: '../remind_mfa_data/h12'
  input_data_version: 'rev1.0.0test_new_trade_data_all_h12_272cf179_mfa'
  scenarios_path: 'config/scenarios'

model_switches:
  scenario: 'SSP2'
  stock_extrapolation_class_name: 'TwoPredictorGompertzExtrapolation'
  regress_over: 'loggdppc_time'
  lifetime_model_name: 'LogNormalLifetime'
  do_stock_extrapolation_by_category: True
  parameter_extrapolation:
    waste_his_imports: LinearToTargetExtrapolation
    waste_his_exports: LinearToTargetExtrapolation
    collection_rate: LinearToTargetExtrapolation
    incineration_rate: LinearToTargetExtrapolation
    mechanical_recycling_rate: LinearToTargetExtrapolation
    chemical_recycling_rate: LinearToTargetExtrapolation
    bio_production_rate: LinearToTargetExtrapolation
    daccu_production_rate: LinearToTargetExtrapolation
    emission_capture_rate: ConstantExtrapolation

visualization:
  do_visualize: True
  do_show_figs: True
  do_save_figs: True
  figures_path: 'data/plastics/output/figures'
  use_stock:
    do_visualize: True
    over_gdp: True
    accumulate_gdp: True
    per_capita: True
  production:
    do_visualize: True
  extrapolation:
    do_visualize: True
  sankey:
    do_visualize: True
    plotter_args:
      slice_dict:
        t: 2016
        #r: 'EUR'
        m: 'Fibres'
      exclude_processes:
        - "sysenv"
        #- "waste_market"
        #- "primary_market"
        #- "intermediate_market"
        #- "good_market"
      exclude_flows: [ ]
  flows:
    do_visualize: False

export:
  do_export: False
  path: 'data/plastics/output/export'
  pickle:
    do_export: True
  csv:
    do_export: True
  iamc:
    do_export: True
  assumptions:
    do_export: True
  docs:
    do_export: True
    path: 'docs/plastics'
